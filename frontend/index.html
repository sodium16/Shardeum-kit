<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FounderOS | AI Lead Automation</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #090b10;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    header {
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: #111420;
      border-radius: 16px;
      border: 1px solid #1e293b;
      margin-bottom: 30px;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #8b5cf6; }
    .logo span { color: #fff; }
    
    #connectBtn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: #8b5cf6;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    #connectBtn.connected { background: #10b981; }

    main {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
    }

    .panel {
      background: #111420;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 32px;
    }

    h2 { font-size: 1.25rem; margin-bottom: 20px; color: #cbd5e1; }
    
    .input-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      background: #090b10;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    input:focus, textarea:focus { border-color: #8b5cf6; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #8b5cf6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-primary:disabled { background: #334155; cursor: not-allowed; }

    .status-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    .HOT { background: #fee2e2; color: #dc2626; }
    .WARM { background: #fef3c7; color: #d97706; }
    .COLD { background: #e0f2fe; color: #0284c7; }

    #logList { list-style: none; margin-top: 10px; }
    .log-item {
      background: #090b10;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 0.85rem;
      border-left: 4px solid #8b5cf6;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Founder<span>OS</span></div>
  <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
</header>

<main>
  <section class="panel">
    <h2>Inbound Lead Scoring</h2>
    <div class="input-group">
      <label>Lead Name</label>
      <input type="text" id="leadName" placeholder="e.g. Rahul Sharma">
    </div>
    <div class="input-group">
      <label>Company</label>
      <input type="text" id="leadCompany" placeholder="e.g. Acme Corp">
    </div>
    <div class="input-group">
      <label>Inquiry Message</label>
      <textarea id="leadMessage" rows="4" placeholder="How can we help?"></textarea>
    </div>
    <button id="processBtn" class="btn-primary" onclick="processLead()">Automate & Log to Shardeum</button>

    <div id="resultPanel" class="status-card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="resultCategory" class="badge">HOT</span>
        <span id="resultConfidence" style="font-size:0.9rem; color:#94a3b8;">Confidence: 95%</span>
      </div>
      <p id="resultReasoning" style="margin-top:12px; font-size:0.95rem; line-height:1.5;"></p>
      <div id="txStatus" style="margin-top:15px; font-size:0.8rem; color:#10b981; font-family:monospace;"></div>
    </div>
  </section>

  <section class="panel">
    <h2>Blockchain Audit Log</h2>
    <p style="font-size:0.8rem; color:#64748b; margin-bottom:16px;">Verified decisions recorded on Shardeum Testnet</p>
    <div id="logList">
      <p style="color:#475569; font-size:0.9rem;">No logs found yet.</p>
    </div>
  </section>
</main>

<script>
  // UPDATE THIS with your deployed DecisionLogger address
  const CONTRACT_ADDRESS = "PASTE_YOUR_DEPLOYED_ADDRESS_HERE";
  
  const DECISION_LOGGER_ABI = [
    "function logDecision(string category, string reasoning, uint8 confidence, string leadData) external returns (uint256)",
    "event DecisionLogged(uint256 indexed id, string category, string reasoning, uint8 confidence, string leadData, address indexed logger, uint256 timestamp)"
  ];

  let provider, signer, account, contract;

  async function connectWallet() {
    if (!window.ethereum) return alert("Please install MetaMask");
    try {
      await window.ethereum.request({ method: 'eth_requestAccounts' });
      provider = new ethers.BrowserProvider(window.ethereum);
      signer = await provider.getSigner();
      account = await signer.getAddress();
      
      const btn = document.getElementById('connectBtn');
      btn.textContent = account.slice(0,6) + "..." + account.slice(-4);
      btn.classList.add('connected');
      
      contract = new ethers.Contract(CONTRACT_ADDRESS, DECISION_LOGGER_ABI, signer);
    } catch (e) { console.error(e); }
  }

  async function processLead() {
    if (!contract) return alert("Connect wallet first!");
    
    const name = document.getElementById('leadName').value;
    const company = document.getElementById('leadCompany').value;
    const message = document.getElementById('leadMessage').value;

    if (!name || !message) return alert("Please fill in lead details");

    document.getElementById('processBtn').disabled = true;
    document.getElementById('processBtn').textContent = "AI Scoring Lead...";

    try {
      // Logic: Simulate AI Lead Scoring (In production, call Claude API here)
      // This mimics the AI scoring a high-intent lead as HOT
      const category = message.toLowerCase().includes("urgent") || message.toLowerCase().includes("budget") ? "HOT" : "WARM";
      const reasoning = `Lead from ${company} shows high intent based on service inquiry.`;
      const confidence = 85;
      const leadData = JSON.stringify({ name, company, message });

      // Update UI with AI results
      displayAIResult(category, confidence, reasoning);

      // Log to Blockchain
      document.getElementById('txStatus').textContent = "🔄 Signing Transaction...";
      const tx = await contract.logDecision(category, reasoning, confidence, leadData);
      
      document.getElementById('txStatus').textContent = "⛏️ Mining on Shardeum...";
      const receipt = await tx.wait();
      
      document.getElementById('txStatus').textContent = `✅ Logged! ID: ${receipt.logs[0].topics[1] || 'Success'}`;
      addLogToUI(category, reasoning);

    } catch (e) {
      console.error(e);
      document.getElementById('txStatus').textContent = "❌ Error: " + (e.reason || "Transaction failed");
    } finally {
      document.getElementById('processBtn').disabled = false;
      document.getElementById('processBtn').textContent = "Automate & Log to Shardeum";
    }
  }

  function displayAIResult(cat, conf, reason) {
    const panel = document.getElementById('resultPanel');
    const catBadge = document.getElementById('resultCategory');
    panel.style.display = 'block';
    catBadge.textContent = cat;
    catBadge.className = 'badge ' + cat;
    document.getElementById('resultConfidence').textContent = `Confidence: ${conf}%`;
    document.getElementById('resultReasoning').textContent = reason;
  }

  function addLogToUI(cat, reason) {
    const list = document.getElementById('logList');
    if (list.innerHTML.includes("No logs found")) list.innerHTML = "";
    
    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `<strong>${cat}</strong>: ${reason}<br><small style="color:#64748b">${new Date().toLocaleTimeString()}</small>`;
    list.prepend(item);
  }
</script>
</body>
</html>
