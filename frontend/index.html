<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FounderOS — Universal AI Orchestrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --surface2: #18181f;
        --border: #2a2a35;
        --text: #f0f0f5;
        --muted: #6b6b80;
        --accent: #e8ff47;
        --green: #47ffb8;
        --hot: #ff4757;
        --warm: #ffa502;
        --cold: #54a0ff;
        --font: "Syne", sans-serif;
        --mono: "Space Mono", monospace;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }
      body::before {
        content: ""; position: fixed; inset: 0;
        background-image: linear-gradient(rgba(232, 255, 71, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232, 255, 71, 0.03) 1px, transparent 1px);
        background-size: 40px 40px; pointer-events: none; z-index: 0;
      }

      header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid var(--border); background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px); }
      .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.02em; }
      .logo span { color: var(--accent); }
      .hdr-right { display: flex; align-items: center; gap: 14px; }
      .wpill { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 7px 16px; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
      .wpill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: 0.3s; }
      .wpill .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
      #connectBtn { font-family: var(--font); font-weight: 700; font-size: 0.85rem; padding: 10px 22px; background: var(--accent); color: #0a0a0f; border: none; border-radius: 8px; cursor: pointer; transition: 0.15s; }

      .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 36px 40px 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 26px; }
      .tag { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
      .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

      .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
      .fld label { display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
      .fld input, .fld textarea, .fld select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: var(--font); font-size: 0.88rem; outline: none; }
      .fld textarea { min-height: 120px; resize: vertical; }
      #analyzeBtn { width: 100%; margin-top: 6px; padding: 13px; background: var(--accent); color: #0a0a0f; border: none; border-radius: 10px; font-family: var(--font); font-weight: 800; font-size: 0.92rem; cursor: pointer; transition: 0.15s; }

      #resultBox { display: none; margin-top: 20px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
      .rhdr { display: flex; align-items: center; justify-content: space-between; padding: 13px 17px; border-bottom: 1px solid var(--border); }
      #rcat { font-family: var(--mono); font-weight: 700; font-size: 0.78rem; padding: 5px 14px; border-radius: 100px; }
      #rcat.HOT { background: rgba(71, 255, 184, 0.15); color: var(--green); }
      #rcat.WARM { background: rgba(255, 165, 2, 0.15); color: var(--warm); }
      #rcat.COLD { background: rgba(255, 71, 87, 0.15); color: var(--hot); }

      #agentFeed { display: none; margin-top: 20px; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: var(--mono); font-size: 0.75rem; color: var(--green); max-height: 150px; overflow-y: auto; line-height: 1.5; }

      .mgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
      .mtile { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
      .mval { font-family: var(--mono); font-size: 1.9rem; font-weight: 700; margin-bottom: 6px; }
      
      #llist { display: flex; flex-direction: column; gap: 9px; }
      .litem { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 0.8rem; border-left: 3px solid var(--accent); }
      
      #toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 9px 22px; font-family: var(--mono); font-size: 0.72rem; opacity: 0; transition: 0.25s; z-index: 100; }
      #toast.show { opacity: 1; }
      .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255, 255, 255, 0.2); border-top-color: currentColor; border-radius: 50%; animation: rot 0.7s linear infinite; }
      @keyframes rot { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Founder<span>OS</span></div>
      <div class="hdr-right">
        <div class="wpill"><div class="dot" id="wdot"></div><span id="waddr">Not connected</span></div>
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
      </div>
    </header>

    <div class="app">
      <div class="card">
        <div class="tag">// 01 — Unified Intake</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Founder Intel Inbox</h2>
            <div class="fld" style="width: 150px; margin-bottom: 0;">
                <select id="appMode">
                    <option value="SALES">Sales Lead</option>
                    <option value="TALENT">Talent Scout</option>
                </select>
            </div>
        </div>

        <div class="frow">
          <div class="fld">
            <label>Contact Name</label>
            <input id="inputName" type="text" placeholder="Rahul" />
          </div>
          <div class="fld">
            <label>Contact Email</label>
            <input id="inputEmail" type="email" placeholder="contact@example.com" />
          </div>
        </div>
        <div class="fld" style="margin-bottom: 14px">
          <label>Inquiry / Resume Content</label>
          <textarea id="inputMsg" placeholder="Paste inquiry "></textarea>
        </div>
        <button id="analyzeBtn" onclick="processUniversal()">Execute Agentic Loop</button>

        <div id="agentFeed"></div>

        <div id="resultBox">
          </div>
      </div>

      <div class="card">
        <div class="tag">// 02 — Shardeum Audit Ledger</div>
        <h2 id="lcnt">Decision Log (0)</h2>
        <div id="llist">
          <div style="text-align: center; color: var(--muted); padding: 40px 0;">No logs verified on-chain.</div>
        </div>
      </div>

      <div class="card" style="grid-column: 1 / -1">
        <div class="tag">// 03 — Operational Analytics</div>
        <div class="mgrid">
          <div class="mtile"><div class="mval" id="mHot" style="color:var(--green)">0</div><div style="font-size:0.7rem; color:var(--muted)">Hot / Top Tier</div></div>
          <div class="mtile"><div class="mval" id="mWarm" style="color:var(--warm)">0</div><div style="font-size:0.7rem; color:var(--muted)">Warm / Potential</div></div>
          <div class="mtile"><div class="mval" id="mCold" style="color:var(--hot)">0</div><div style="font-size:0.7rem; color:var(--muted)">Cold / Mismatch</div></div>
          <div class="mtile"><div class="mval" id="mTime" style="color:var(--accent)">0h</div><div style="font-size:0.7rem; color:var(--muted)">Time Saved (Est)</div></div>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const CONTRACT_ADDRESS = "0x114A6B37107878c9428999224B1aB37C1CB4e65E";
      const EXPLORER_URL = "https://explorer-mezame.shardeum.org";
      const ABI = ["function logDecision(string category, string reasoning, uint8 confidence, string leadData) external returns (uint256)"];
      
      let provider, signer, contract, stats = { HOT: 0, WARM: 0, COLD: 0 };

      async function connectWallet() {
        if (!window.ethereum) return toast("Install MetaMask", "error");
        try {
          await window.ethereum.request({ method: "eth_requestAccounts" });
          provider = new ethers.BrowserProvider(window.ethereum);
          signer = await provider.getSigner();
          contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
          const addr = await signer.getAddress();
          document.getElementById("waddr").textContent = addr.slice(0, 6) + "…" + addr.slice(-4);
          document.getElementById("wdot").classList.add("on");
          document.getElementById("connectBtn").textContent = "Connected ✓";
          toast("Connected to Shardeum", "success");
        } catch (e) { console.error(e); }
      }

      async function analyzeUniversalAI(name, email, content, mode) {
        const API_KEY = "AIzaSyBGzCfjRtt1Lz-Zi3LPrIyBN2ZTg882TRI";
        const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        
        const prompt = `You are the FounderOS Orchestrator. 
        MODE: ${mode}. INPUT FROM: ${name} (${email}).
        CONTENT: "${content}".

        TASK:
        1. If SALES: Analyze budget, timeline, and strategic fit.
        2. If TALENT: Analyze merit, project impact, and skill gaps (NLP-based).

        RETURN ONLY JSON:
        {
          "type": "${mode}",
          "category": "HOT", "WARM", or "COLD",
          "score": 0-100,
          "analysis": "3-4 sentences of deep reasoning",
          "meta1": "Label: Value (e.g. Budget: $5k or Merit: 90%)",
          "meta2": "Label: Value (e.g. Timeline: Immediate or Gaps: None)",
          "emailSubject": "...",
          "emailBody": "..."
        }`;

        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        return JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());
      }

      async function processUniversal() {
        const name = document.getElementById("inputName").value;
        const email = document.getElementById("inputEmail").value;
        const content = document.getElementById("inputMsg").value;
        const mode = document.getElementById("appMode").value;
        const feed = document.getElementById("agentFeed");

        if (!name || !email || !content) return toast("Fill all fields", "error");
        if (!contract) return toast("Connect wallet", "error");

        const btn = document.getElementById("analyzeBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span> Processing...';
        
        feed.style.display = "block";
        feed.innerHTML = `> [AGENT] Initializing ${mode} Intelligence Loop...<br>`;
        
        try {
          feed.innerHTML += `> [AGENT] Requesting Semantic Analysis for ${name}...<br>`;
          const ai = await analyzeUniversalAI(name, email, content, mode);
          
          displayResult(ai, name, email);
          
          feed.innerHTML += `> [AGENT] Category: ${ai.category} (${ai.score}%). Drafting Outreach...<br>`;
          feed.innerHTML += `> [SHARDEUM] Broadcasting Immutable Audit to Mezame...<br>`;

          const tx = await contract.logDecision(
            ai.category,
            ai.analysis.slice(0, 180),
            Math.min(Math.round(ai.score), 100),
            JSON.stringify({ n: name.slice(0,15), t: ai.type }),
            { gasLimit: 400000 }
          );

          feed.innerHTML += `> [SHARDEUM] Broadcast Successful. Hash: ${tx.hash.slice(0,12)}...<br>`;
          await tx.wait();
          feed.innerHTML += `> [SUCCESS] On-chain verification confirmed.<br>`;

          updateStats(ai.category);
          addLogToUI(ai, name);
          toast("Loop Complete", "success");
        } catch (e) {
          feed.innerHTML += `<span style="color:var(--hot)">> [ERROR] ${e.message}</span><br>`;
        } finally {
          btn.disabled = false;
          btn.innerHTML = "Execute Agentic Loop";
        }
      }

      function displayResult(ai, name, email) {
        const resBox = document.getElementById("resultBox");
        resBox.style.display = "block";
        
        let cleanBody = ai.emailBody
            .replace(/\[name\]/gi, name).replace(/\[leadname\]/gi, name)
            .replace(/\[founder\]/gi, "Vishwas");

        const gmailLink = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${encodeURIComponent(ai.emailSubject)}&body=${encodeURIComponent(cleanBody)}`;

        resBox.innerHTML = `
          <div class="rhdr">
            <span id="rcat" class="${ai.category}">${ai.category} ${ai.type}</span>
            <span style="font-family:var(--mono); font-size:0.7rem; color:var(--muted);">${ai.score}% Confidence</span>
          </div>
          <div style="padding:18px;">
            <p style="font-size:0.9rem; line-height:1.5; color:var(--text); margin-bottom:15px;">${ai.analysis}</p>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <div style="background:var(--surface2); padding:10px; border-radius:8px; border-left:2px solid var(--accent);">
                    <small style="color:var(--muted); font-size:0.6rem; display:block;">${ai.meta1.split(':')[0] || 'DATA'}</small>
                    <span style="font-weight:700;">${ai.meta1.split(':')[1] || 'N/A'}</span>
                </div>
                <div style="background:var(--surface2); padding:10px; border-radius:8px; border-left:2px solid var(--accent);">
                    <small style="color:var(--muted); font-size:0.6rem; display:block;">${ai.meta2.split(':')[0] || 'STATUS'}</small>
                    <span style="font-weight:700;">${ai.meta2.split(':')[1] || 'N/A'}</span>
                </div>
            </div>

            <div style="background:var(--surface2); padding:15px; border-radius:12px; border:1px solid var(--border);">
                <div style="font-family:var(--mono); font-size:0.6rem; color:var(--accent); margin-bottom:8px;">// AUTOMATED ACTION</div>
                <p style="font-style:italic; font-size:0.8rem; margin-bottom:12px; color:var(--muted);">"${cleanBody.slice(0,100)}..."</p>
                <a href="${gmailLink}" target="_blank" style="text-decoration:none;">
                    <button style="width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:800; cursor:pointer;">
                        ✉️ Send ${ai.type === 'SALES' ? 'Sales Pitch' : 'Interview Invite'}
                    </button>
                </a>
            </div>
          </div>
        `;
      }

      function addLogToUI(ai, name) {
        const list = document.getElementById("llist");
        if (list.innerText.includes("No logs verified")) list.innerHTML = "";
        const el = document.createElement("div");
        el.className = "litem";
        el.innerHTML = `<strong>${name}</strong> — ${ai.type} (${ai.category}) | <small>${new Date().toLocaleTimeString()}</small><br><span style="color:var(--muted); font-size:0.7rem;">Proof of Merit Recorded on Shardeum</span>`;
        list.prepend(el);
      }

      function updateStats(cat) {
        stats[cat] = (stats[cat] || 0) + 1;
        document.getElementById("mHot").textContent = stats.HOT || 0;
        document.getElementById("mWarm").textContent = stats.WARM || 0;
        document.getElementById("mCold").textContent = stats.COLD || 0;
        document.getElementById("mTime").textContent = (stats.HOT + stats.WARM + stats.COLD) * 4 + "h";
      }

      function toast(msg, type) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "show";
        setTimeout(() => t.className = "", 3000);
      }
    </script>
  </body>
</html>
